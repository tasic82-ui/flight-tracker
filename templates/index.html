<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#060a12">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Flights">
  <title>Flight Tracker</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <link rel="stylesheet" href="/static/css/app.css">
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-icon">✈</div>
    <div>
      <h1>Flight Tracker</h1>
      <div class="header-sub">Live praćenje letova</div>
    </div>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <input
      type="text"
      id="search-input"
      class="search-input"
      placeholder="Broj leta (JU123, LH441...)"
      maxlength="10"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
    >
    <button id="search-btn" class="search-btn" aria-label="Pretraži">🔍</button>
  </div>

  <!-- Loading -->
  <div id="loading">
    <div class="spinner"></div>
    <span>Preuzimam podatke...</span>
  </div>

  <!-- Flight Card -->
  <div id="flight-card"></div>

  <!-- Map -->
  <div id="map-container">
    <div id="map"></div>
  </div>

  <!-- Tracked flights -->
  <div class="section-title">Praćeni letovi</div>
  <div id="tracked-list"></div>

  <div class="bottom-pad"></div>
</div>

<!-- Toast -->
<div id="toast" class="toast" role="alert" aria-live="polite"></div>

<script src="/static/js/app.js"></script>
</body>
</html>
